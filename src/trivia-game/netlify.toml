[build]
  command   = "npm install"
  functions = "netlify/functions"

# Proxy /api/* → opentdb.com server-side, completely bypassing browser CORS
[[redirects]]
  from = "/api/*"
  to   = "https://opentdb.com/:splat"
  status = 200
  force  = true

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
